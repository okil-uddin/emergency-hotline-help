<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Hotline</title>
    <!-- Tailwind Cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-[#F5FFF6]">
    <header>
        <nav class="bg-white flex flex-col md:flex-row justify-between items-center p-5">
            <div class="left-side-nav flex flex-col md:flex-row justify-between items-center
            gap-2">
                <img class="w-[50px] h-[50px]" src="./assets/logo.png" alt="">
                <h1 class="text-[#006747] font-extrabold text-3xl">Emergency <br>
                    Service</h1>
            </div>
            <div class="right-side-nav flex justify-between items-center
            gap-10">
                <div class="flex justify-center items-center gap-3 bg-[#F5FFF6]
                w-[100px] h-[50px] rounded-full">
                    <p class="font-bold"><span>0</span></p>
                    <img class="w-[30px] h-[30px]" src="./assets/heart.png" alt="">
                </div>
                <div class="flex justify-center items-center gap-3 bg-[#F5FFF6]
                w-[100px] h-[50px] rounded-full">
                    <p class="font-bold"><span>100</span></p>
                    <img class="w-[30px] h-[30px]" src="./assets/coin.png" alt="">
                </div>
                <div class="flex justify-center items-center bg-[#00A63E]
                w-[100px] h-[50px] rounded-full">
                    <p class="text-white font-semibold"><span>2</span> Copy</p>
                </div>
            </div>
        </nav>
    </header>
    <script src="./js/script.js"></script>
</body>

</html>
